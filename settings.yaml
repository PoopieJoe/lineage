text_rendering:
  default_font:
    path: "fonts/Gothica/Gothica-Bold.ttf"  # relative path or system font name
    size: 18               # base point size
    color: "#FFFFFF"       # hex or named color
    alpha: 1.0             # 0.0 - 1.0

debug:
  enabled: false           # TODO
  log_level: "debug"       # debug | info | warning | error
  output:
    with_timestamp: false
    to_console: true
    to_file: true
    file_name: "latest.log"
  dev_tools:
    break_on_error: false